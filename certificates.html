<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Certificates</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: #000; color: #fff; }

    #bg-wrap { position: fixed; inset: 0; z-index: 0; will-change: transform; }
    #bg-a, #bg-b { position: absolute; inset: 0; background-size: cover; background-position: center; transition: opacity 0.8s ease; }
    #bg-b { opacity: 0; }
    #bg-overlay {
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(to bottom, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.14) 32%, rgba(0,0,0,0.14) 58%, rgba(0,0,0,0.88) 100%);
    }

    #grain { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 128px; }
    #scanline { position: fixed; inset: 0; z-index: 2; pointer-events: none; background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(255,255,255,0.009) 3px, rgba(255,255,255,0.009) 4px); }

    #entry-veil { position: fixed; inset: 0; z-index: 200; background: #000; opacity: 1; transition: opacity 0.7s ease; pointer-events: none; }
    #entry-veil.lifted { opacity: 0; }

    #wipe-wrap { position: fixed; inset: 0; z-index: 190; pointer-events: none; overflow: hidden; }
    .wipe-line { position: absolute; left: -100%; width: 100%; height: 1px; background: rgba(255,255,255,0.18); }

    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 30;
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 40px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      opacity: 0; transform: translateY(-16px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #topbar.show { opacity: 1; transform: translateY(0); }

    #shelf-wrapper {
      position: fixed; top: 64px; left: 0; right: 0; z-index: 20;
      padding: 12px 40px 28px;
      opacity: 0; transform: translateY(-22px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    #shelf-wrapper.show { opacity: 1; transform: translateY(0); }

    #nav-dots { display: flex; gap: 6px; margin-bottom: 14px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.22); transition: all 0.3s; }
    .dot.active { background: #fff; width: 18px; border-radius: 3px; }

    #shelf { display: flex; gap: 16px; transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

    .cert-card {
      flex-shrink: 0; width: 120px; height: 150px;
      border-radius: 12px; overflow: hidden; cursor: pointer;
      border: 2px solid transparent; position: relative;
      background: rgba(255,255,255,0.06);
      opacity: 0; transform: translateY(-18px) scale(0.92);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.3, 0.64, 1), border-color 0.3s, box-shadow 0.3s;
    }
    .cert-card.revealed { opacity: 1; transform: translateY(0) scale(1); }
    .cert-card.active {
      transform: scale(1.16) translateY(10px) !important;
      border-color: rgba(255,255,255,0.75);
      box-shadow: 0 0 30px rgba(255,255,255,0.18), 0 20px 48px rgba(0,0,0,0.55);
    }
    .cert-card:not(.active):hover { transform: scale(1.06) translateY(4px) !important; border-color: rgba(255,255,255,0.22); }
    .cert-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cert-card-icon {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    }
    .cert-card-icon svg { width: 36px; height: 36px; opacity: 0.7; }
    .card-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 8px 8px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.9); text-align: center;
    }

    #detail {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      padding: 60px 40px 38px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.45) 60%, transparent 100%);
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #detail.show { opacity: 1; transform: translateY(0); }
    #detail.hide { opacity: 0; transform: translateY(10px); }
    #detail-inner { display: flex; justify-content: space-between; align-items: flex-end; gap: 32px; }

    .btn-hint { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.42); font-family: 'DM Mono', monospace; }
    .btn-circle { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid currentColor; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    .tag { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 500; background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.62); letter-spacing: 0.03em; }
    .year-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.08); font-size: 11px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; }

    #modal {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0); backdrop-filter: blur(0px);
      transition: background 0.4s, backdrop-filter 0.4s;
      pointer-events: none;
    }
    #modal.open { background: rgba(0,0,0,0.76); backdrop-filter: blur(22px); pointer-events: all; }
    #modal-card {
      background: rgba(14,14,20,0.97); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px; padding: 28px; max-width: 780px; width: 92%;
      transform: scale(0.91) translateY(26px); opacity: 0;
      transition: transform 0.42s cubic-bezier(0.34,1.4,0.64,1), opacity 0.36s;
    }
    #modal.open #modal-card { transform: scale(1) translateY(0); opacity: 1; }

    /* credential badge inside modal */
    #m-credential-wrap { margin-bottom: 20px; }
    .credential-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 14px;
    }
    .credential-badge span { font-size: 12px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.45); letter-spacing: 0.06em; }
    .credential-id { font-size: 12px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.6); }

    #flash { position: fixed; inset: 0; z-index: 99; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.12s; }
    #flash.pop { opacity: 0.08; }
    #exit-veil { position: fixed; inset: 0; z-index: 198; background: #000; opacity: 0; pointer-events: none; transition: opacity 0.55s ease; }
    #exit-veil.active { opacity: 1; }

    .back-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.28); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; transition: color 0.2s; }
    .back-btn:hover { color: rgba(255,255,255,0.65); }
    .back-arrow { font-size: 15px; line-height: 1; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body class="select-none">

  <div id="entry-veil"></div>
  <div id="wipe-wrap"></div>
  <div id="exit-veil"></div>
  <div id="flash"></div>

  <div id="bg-wrap">
    <div id="bg-a"></div>
    <div id="bg-b"></div>
    <div id="bg-overlay"></div>
  </div>
  <div id="grain"></div>
  <div id="scanline"></div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="flex items-center gap-4">
      <button class="back-btn" onclick="goBack()">
        <span class="back-arrow">←</span> Back
      </button>
      <div class="w-px h-4 bg-white/10"></div>
      <div>
        <!-- <div class="text-[10px] font-mono text-white/28 tracking-[0.2em] uppercase">Portfolio</div> -->
         <a href="projects.html"> <divclass="text-base font-semibold tracking-tight leading-tight">Projects</divclass=></a>
       
      
      </div>
      <div>
        <!-- <div class="text-[10px] font-mono text-white/28 tracking-[0.2em] uppercase">Portfolio</div> -->
         <a href="certificates.html"> <divclass="text-base font-semibold tracking-tight leading-tight">
        <div class="text-base font-semibold tracking-tight leading-tight">Certificates</div>
        </a>
      </div>
    </div>
    <div class="flex items-center gap-5 text-white/28 text-[11px] font-mono tracking-wider">
      <span id="clock"></span>
      <span class="flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-green-400/60 inline-block" style="animation: pulse 2s infinite;"></span>
        Open to work
      </span>
    </div>
  </div>

  <!-- Shelf -->
  <div id="shelf-wrapper">
    <div id="nav-dots"></div>
    <div id="shelf"></div>
  </div>

  <!-- Detail -->
  <div id="detail">
    <div id="detail-inner">
      <div style="flex:1; min-width:0;">
        <div class="flex items-center gap-2.5 mb-2">
          <span class="text-[10px] font-mono text-white/35 tracking-[0.18em] uppercase" id="d-issuer"></span>
          <span class="year-badge" id="d-year"></span>
        </div>
        <h1 class="text-5xl font-bold leading-none tracking-tight mb-3" id="d-title">—</h1>
        <p class="text-sm text-white/50 leading-relaxed max-w-md" id="d-desc">—</p>
      </div>
      <div style="flex-shrink:0; text-align:right;">
        <div class="flex flex-wrap gap-2 justify-end mb-5" id="d-tags"></div>
        <div class="flex gap-5 justify-end items-center">
          <span class="btn-hint" id="btn-open" style="cursor:pointer;">
            <span class="btn-circle">×</span> Details
          </span>
          <span class="btn-hint" style="opacity:0.3; font-size:12px;">← →</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal">
    <div id="modal-card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="text-[10px] font-mono text-white/35 tracking-[0.18em] uppercase" id="m-issuer"></span>
          <span class="year-badge" id="m-year"></span>
        </div>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.35);font-size:18px;line-height:1;padding:4px 8px;border-radius:6px;transition:color 0.2s;" onmouseover="this.style.color='rgba(255,255,255,0.75)'" onmouseout="this.style.color='rgba(255,255,255,0.35)'">✕</button>
      </div>
      <div id="m-img-wrap" style="width:100%;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);">
        <img id="m-img" src="" alt="" style="width:100%;height:auto;display:block;max-height:72vh;object-fit:contain;" />
      </div>
      <div style="display:flex; align-items:center; justify-content:space-between; margin-top:16px; gap:12px;">
        <div>
          <div style="font-size:14px;font-weight:500;margin-bottom:2px;" id="m-title"></div>
         
        </div>
      </div>
    </div>
  </div>

  <script>
  const certificates = [
    {
      title: "Full Stack Web Development",
      issuer: "Municipal Information and Communication Technlogy Office Angono",
      year: "2025",
      credentialId: "null",
      desc: "This training has equipped the participant with essential knowledge and practical skills in front-end and back-end web development, preparing them for future endeavors in the field of web technologies.",
      tags: ["HTML", "CSS", "JavaScript", "Tailwind CSS", "ES6 Functional JavaScript", "Basic PHP", "Object-Oriented PHP", "MVC", "Laravel Basics" ],
      image: "src/images/certificates/fullstack.png",
      certImage: "src/images/certificates/fullstack_cert.png",
      thumb: "src/images/certificates/fullstack_logo.png",
      link: "#"
    },
    {
      title: "Data Mastery with PYTHON: Practical Analytics and Visualization",
      issuer: "Unified Computer Society",
      year: "2024",
      credentialId: "Null",
      desc: "This seminar equipped participants with hands-on skills in Python programming, practical analytics, and data visualization techniques, empowering them to make data-driven decisions effectively.",
      tags: ["Python"],
      image: "src/images/certificates/python.png",
      certImage: "src/images/certificates/python_cert.png",
      thumb: "src/images/certificates/python_logo.png",
      link: "#"
    },
    {
      title: "Harnessing the Data Advantage: Transforming Challenges into Opportunities",
      issuer: "Unified Computer Society",
      year: "2024",
      credentialId: null,
      desc: "Given on 17th day of May 2024, to gain knowledge and inspire to continue the journey in the realm of data analytic.",
      tags: ["Data Analytics"],
      image: "src/images/certificates/dataMastery.png",
      certImage: "src/images/certificates/dataMastery_cert.png",
      thumb: "src/images/certificates/dataMastery_logo.png",
      link: "#"
    },
    {
      title: "Cyber Hygiene Training",
      issuer: "APAC Cybersecurity Fund",
      year: "2026",
      credentialId: null,
      desc: "Certification of Completion for completing Cyber Hygiene Training.",
      tags: ["Cyber Hygiene"],
      image: "src/images/certificates/hygiene.png",
      certImage: "src/images/certificates/hygiene_cert.jpg",
      thumb: "src/images/certificates/hygiene_logo.png",
      
      link: "#"
    },
    // {
    //   title: "Scrum Master Certified",
    //   issuer: "Scrum Alliance",
    //   year: "2023",
    //   credentialId: "CSM-2023-00512",
    //   desc: "Certification in Agile project management and Scrum frameworks — sprint planning, retrospectives, and cross-functional team facilitation.",
    //   tags: ["Agile", "Scrum", "Project Mgmt", "Leadership"],
    //   image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=1200&q=80",
    //   certImage: "src/images/certificates/hygiene_cert.jpg",
    //   thumb: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=300&q=80",
    //   link: "#"
    // },
    // {
    //   title: "DeepLearning.AI TensorFlow",
    //   issuer: "DeepLearning.AI",
    //   year: "2022",
    //   credentialId: "DL-TF-2022-1198",
    //   desc: "4-course specialization on building and deploying neural networks using TensorFlow — CNNs, NLP, sequences, and time series.",
    //   tags: ["TensorFlow", "Deep Learning", "NLP", "Python"],
    //   image: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=1200&q=80",
    //   certImage: "src/images/certificates/hygiene_cert.jpg",
    //   thumb: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=300&q=80",
    //   link: "#"
    // },
  ];

  let active = 0, bgFlip = false;
  let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;

  const bgWrap   = document.getElementById('bg-wrap');
  const bgA      = document.getElementById('bg-a');
  const bgB      = document.getElementById('bg-b');
  const shelf    = document.getElementById('shelf');
  const detail   = document.getElementById('detail');
  const navDots  = document.getElementById('nav-dots');
  const modal    = document.getElementById('modal');
  const flash    = document.getElementById('flash');
  const wipeWrap = document.getElementById('wipe-wrap');

  // Build shelf
  certificates.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.id = 'dot-' + i;
    navDots.appendChild(dot);

    const card = document.createElement('div');
    card.className = 'cert-card';
    card.id = 'card-' + i;
    card.style.transitionDelay = `${i * 55}ms`;
    card.innerHTML = `<img src="${c.thumb}" alt="${c.title}" loading="lazy"/><div class="card-label">${c.title}</div>`;
    card.addEventListener('click', () => {
      if (active === i) openModal(i);
      else setActive(i);
    });
    shelf.appendChild(card);
  });

  document.getElementById('btn-open').addEventListener('click', () => openModal(active));

  // Entry sequence
  function runEntryAnimation() {
    bgA.style.backgroundImage = `url('${certificates[0].image}')`;
    bgA.style.opacity = '1';
    setTimeout(() => spawnWipeLines(), 80);
    setTimeout(() => document.getElementById('entry-veil').classList.add('lifted'), 220);
    setTimeout(() => document.getElementById('topbar').classList.add('show'), 480);
    setTimeout(() => document.getElementById('shelf-wrapper').classList.add('show'), 580);
    setTimeout(() => document.querySelectorAll('.cert-card').forEach(c => c.classList.add('revealed')), 680);
    setTimeout(() => setActive(0), 900);
  }

  function spawnWipeLines() {
    [0.12, 0.28, 0.44, 0.58, 0.72, 0.88].forEach((pos, i) => {
      const line = document.createElement('div');
      line.className = 'wipe-line';
      line.style.top = (pos * 100) + 'vh';
      wipeWrap.appendChild(line);
      setTimeout(() => {
        line.style.transition = 'left 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease 0.45s';
        line.style.left = '100%';
        line.style.opacity = '0';
        setTimeout(() => line.remove(), 900);
      }, i * 28);
    });
  }

  function setActive(idx) {
    const prev = active;
    active = idx;
    if (idx !== prev) {
      flash.classList.add('pop');
      setTimeout(() => flash.classList.remove('pop'), 140);
    }
    document.getElementById('card-' + prev)?.classList.remove('active');
    document.getElementById('card-' + idx)?.classList.add('active');
    document.getElementById('dot-' + prev)?.classList.remove('active');
    document.getElementById('dot-' + idx)?.classList.add('active');

    const cardW = 136;
    const visible = Math.floor((window.innerWidth - 80) / cardW);
    const offset = Math.max(0, idx - Math.floor(visible / 2)) * cardW;
    shelf.style.transform = `translateX(-${offset}px)`;

    crossfadeBg(idx);
    updateDetail(idx);
  }

  function crossfadeBg(idx) {
    const url = `url('${certificates[idx].image}')`;
    if (!bgFlip) {
      bgB.style.backgroundImage = url;
      requestAnimationFrame(() => { bgB.style.opacity = '1'; bgA.style.opacity = '0'; });
    } else {
      bgA.style.backgroundImage = url;
      requestAnimationFrame(() => { bgA.style.opacity = '1'; bgB.style.opacity = '0'; });
    }
    bgFlip = !bgFlip;
  }

  function updateDetail(idx) {
    const c = certificates[idx];
    detail.classList.remove('show');
    detail.classList.add('hide');
    setTimeout(() => {
      document.getElementById('d-issuer').textContent = c.issuer;
      document.getElementById('d-year').textContent = c.year;
      document.getElementById('d-title').textContent = c.title;
      document.getElementById('d-desc').textContent = c.desc;
      document.getElementById('d-tags').innerHTML = c.tags.map(t => `<span class="tag">${t}</span>`).join('');
      detail.classList.remove('hide');
      detail.classList.add('show');
    }, 180);
  }

  function openModal(idx) {
    const c = certificates[idx];
    document.getElementById('m-issuer').textContent = c.issuer;
    document.getElementById('m-year').textContent = c.year;
    document.getElementById('m-title').textContent = c.title;
    const img = document.getElementById('m-img');
    img.src = c.certImage ;
    img.alt = c.title;
    modal.classList.add('open');
  }
  window.closeModal = () => modal.classList.remove('open');
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

  // Parallax
  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });
  (function loop() {
    targetX += (mouseX - targetX) * 0.055;
    targetY += (mouseY - targetY) * 0.055;
    bgWrap.style.transform = `scale(1.09) translate(${targetX * 14}px, ${targetY * 10}px)`;
    requestAnimationFrame(loop);
  })();

  // Keyboard
  document.addEventListener('keydown', e => {
    if (modal.classList.contains('open')) { if (e.key === 'Escape') closeModal(); return; }
    if (e.key === 'ArrowRight') setActive(Math.min(active + 1, certificates.length - 1));
    if (e.key === 'ArrowLeft')  setActive(Math.max(active - 1, 0));
    if (e.key === 'Enter' || e.key === ' ') openModal(active);
  });

  // Back nav
  window.goBack = function() {
    const veil = document.getElementById('exit-veil');
    veil.classList.add('active');
    setTimeout(() => { window.location.hrefhref = 'index.html'; }, 580);
  };

  // Clock
  const clockEl = document.getElementById('clock');
  (function tickClock() {
    clockEl.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    setTimeout(tickClock, 10000);
  })();

  runEntryAnimation();
  </script>
</body>
</html>
